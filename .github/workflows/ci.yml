name: PipeSense Artifact Checks

on:
  push:
  pull_request:

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: No-simulator artifact checks
        run: |
          python scripts/estimate_hardware_cost.py
          python scripts/check_artifact.py

      - name: Install HDL simulator
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog yosys z3 cvc4
          git clone https://github.com/YosysHQ/sby.git /tmp/sby
          git -C /tmp/sby checkout fea6e467d067b3ea84b6b5ac08cd48beb59f0d42
          sudo make -C /tmp/sby install PREFIX=/usr/local

      - name: Run HDL simulation and validate CSVs
        run: |
          python scripts/run_sim.py
          python scripts/validate_results.py
          python scripts/compare_reference.py

      - name: Run full parameter sweep
        run: |
          python scripts/run_sweep.py

      - name: Run safety fuzz regression
        run: |
          python verif/fuzz_runner.py --seeds 500

      - name: Run ablations
        run: |
          python scripts/run_ablations.py

      - name: Run generic synthesis proxy
        run: |
          python scripts/synth_area_report.py

      - name: Verify formal toolchain
        run: |
          command -v sby
          command -v yosys
          command -v z3
          command -v cvc4

      - name: Prove bounded reconfiguration safety
        run: |
          sby -f -d formal/results/reconfig_unit formal/reconfig_unit.sby

      - name: Prove bounded token conservation
        run: |
          sby -f -d formal/results/token_conservation formal/token_conservation.sby

      - name: Prove bounded no-double-commit safety
        run: |
          sby -f -d formal/results/no_double_commit_across_mode_switch formal/no_double_commit_across_mode_switch.sby

      - name: Check public results summary
        run: |
          python scripts/check_results_summary.py

      - name: Upload generated results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipesense-results
          path: |
            results/**
